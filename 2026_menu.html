<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 낮은마음바자회</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background-color: #fdfdfd; text-align: center; scroll-behavior: smooth; }

    /* 컨테이너 상단 여백 살짝 줄이기 */
    h2 { margin: 15px 0; font-size: 1.3rem; }
    
    .container { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
     /* 메인 이미지 모바일 최적화 및 높이 제한 */
    .menu-image { 
      max-width: 100%; 
      /* 뷰포트 높이(vh)의 60%를 넘지 않도록 설정하여 하단 버튼 공간 확보 */
      max-height: 60vh; 
      height: auto; 
      display: block;
      margin: 0 auto;
      object-fit: contain; /* 가로세로 비율 유지 */
    }

    /* 슬라이더 스타일 */
    .swiper { width: 100%; height: auto; margin-top: 20px; border-radius: 10px; background: #eee; }
    .swiper-slide img { width: 100%; height: auto; display: block; }
    
    /* 카탈로그 안내 문구 */
    .swipe-info { font-size: 0.85rem; color: #888; margin-top: 10px; }

    .account-section { margin-top: 30px; padding: 20px; background-color: #f0f0f0; border-radius: 10px; }
    .account-number { font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; }
    
    .btn { color: white; border: none; padding: 12px 20px; font-size: 1rem; border-radius: 8px; cursor: pointer; margin: 5px; display: inline-block; text-decoration: none; font-weight: bold; }
    .copy-btn { background-color: #4CAF50; }
    .view-btn { background-color: #f39c12; }

    .floating-btn { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background-color: #007BFF; color: white; border: none; padding: 12px 16px; font-size: 1rem; border-radius: 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); cursor: pointer; }

    /* 1. 슬라이더 하단에 페이지 번호가 들어갈 공간 확보 */
    .mySwiper {
      padding-bottom: 40px; /* 번호가 들어갈 아래쪽 여백 */
      background-color: transparent; /* 배경색이 있다면 조절 */
    }
    
    /* 2. 페이지 번호 위치를 절대값이 아닌 여백 안으로 이동 */
    .mySwiper .swiper-pagination-fraction {
      bottom: 5px; /* 컨테이너 바닥에서 5px 정도만 띄움 */
      font-weight: bold;
      color: #555;
    }
    
    /* 3. 좌우 화살표 버튼이 이미지를 너무 가린다면 투명도를 조절할 수 있습니다 (선택) */
    .swiper-button-next, .swiper-button-prev {
      top: 45%; /* 화살표 중심 위치 살짝 조정 */
      color: #007BFF;
      transform: scale(0.7); /* 화살표 크기를 살짝 줄여서 이미지를 덜 가리게 함 */
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>2026년 낮은마음 선교바자회</h2>
    
    <img src="poster1.jpg" alt="낮은마음바자회 이미지" class="menu-image">
    
    <div style="margin-top: 15px;">
        <button class="btn view-btn" onclick="scrollToCatalog()">바자회 상품 보러가기</button>
        <button class="btn copy-btn" onclick="copyAccount()">계좌번호 복사</button>
    </div>
    <div class="account-section" id="account-section">
      <div class="account-number" id="account">카카오뱅크 3333 1561 53575 이설희</div>
      <p style="font-size: 0.9rem; color: #666;">후원해주신 정성은 선교를 위해 소중히 사용됩니다.</p>
    </div>
    
    <div id="catalog-area">
      <p class="swipe-info">◀ 좌우로 밀어서 보세요 ▶</p>
      <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="swiper-container">
          </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
      </div>
    </div>

    
  </div>
<!--
  <button class="floating-btn" onclick="scrollToAccount()">이체하기</button>
-->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    // 1. 이미지 동적 생성 (107장)
    const container = document.getElementById('swiper-container');
    const totalImages = 107; 

    // 기존 스크립트 내 반복문 부분 수정
    for (let i = 1; i <= totalImages; i++) {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
    
      // 1. Zoom을 위한 컨테이너 추가
      const zoomContainer = document.createElement('div');
      zoomContainer.className = 'swiper-zoom-container';
    
      const img = document.createElement('img');
      const fileNumber = String(i).padStart(4, '0'); 
      img.src = `img/2026_catalog_page-${fileNumber}.jpg`; 
      img.alt = `카탈로그 페이지 ${i}`;
      img.loading = "lazy";
    
      // 2. 조립 순서: img -> zoomContainer -> slide
      zoomContainer.appendChild(img);
      slide.appendChild(zoomContainer);
      container.appendChild(slide);
    }

    // 2. Swiper 초기화
    const swiper = new Swiper(".mySwiper", {
      // Zoom 기능 활성화
      zoom: {
        maxRatio: 3, // 최대 3배까지 확대 가능
        minRatio: 1,
      },
      pagination: { el: ".swiper-pagination", type: "fraction" },
      navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
      lazy: true,
      loop: true
    });

    // 3. 유틸리티 함수
    function copyAccount() {
      const accountText = document.getElementById("account").innerText;
      navigator.clipboard.writeText(accountText).then(() => {
        alert("계좌번호가 복사되었습니다.");
      }).catch(err => alert("복사실패: " + err));
    }

    function scrollToAccount() {
      document.getElementById("account-section").scrollIntoView({ behavior: "smooth" });
    }

    function scrollToCatalog() {
      document.getElementById("catalog-area").scrollIntoView({ behavior: "smooth" });
    }
  </script>
</body>
</html>
