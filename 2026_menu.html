<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 낮은마음바자회</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fdfdfd;
      text-align: center;
      scroll-behavior: smooth;
    }
    .menu-image {
      max-width: 100%;
      height: auto;
      padding: 10px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .account-section {
      margin-top: 30px;
      padding: 20px;
      background-color: #f0f0f0;
    }
    .account-number {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    /* 버튼 공통 스타일 */
    .btn {
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      display: inline-block;
      text-decoration: none;
    }
    .copy-btn {
      background-color: #4CAF50;
    }
    .copy-btn:hover {
      background-color: #45a049;
    }
    /* 카탈로그 다운로드 버튼 스타일 */
    .download-btn {
      background-color: #f39c12; /* 오렌지 계열로 구분 */
      margin-left: 5px;
    }
    .download-btn:hover {
      background-color: #e67e22;
    }

    .floating-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 12px 16px;
      font-size: 1rem;
      border-radius: 50px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    .floating-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>2026년 낮은마음 선교바자회</h1>
    <img src="poster1.jpg" alt="낮은마음바자회 이미지" class="menu-image">

    <div class="account-section" id="account-section">
      <div class="account-number" id="account">카카오뱅크 3333 1561 53575 이설희</div>
      <button class="btn copy-btn" onclick="copyAccount()">계좌번호 복사하기</button>
      
      <a href="2026_catalog.pdf" download class="btn download-btn">카탈로그 다운받기</a>
      </div>
  </div>

  <button class="floating-btn" onclick="scrollToAccount()">이체</button>

  <script>
    function copyAccount() {
      const accountText = document.getElementById("account").innerText;
      navigator.clipboard.writeText(accountText).then(() => {
        alert("계좌번호가 복사되었습니다.");
      }).catch(err => {
        alert("복사에 실패했습니다: " + err);
      });
    }

    function scrollToAccount() {
      document.getElementById("account-section").scrollIntoView({ behavior: "smooth" });
    }
  </script>
</body>
</html>
